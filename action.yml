name: "Tailor your Templates"
description: "Install and run the tailor CLI to measure, fit, and alter your GitHub project templates 🪡"
branding:
  icon: "scissors"
  color: "purple"
inputs:
  version:
    description: "Tailor version to install (e.g. 0.2.0). Defaults to the version matching this action release."
    required: false
  fit:
    description: "Run tailor fit to bootstrap a new project. Requires GH_TOKEN in the job env."
    required: false
    default: "false"
  alter:
    description: "Run tailor alter to apply swatches and repository settings. Requires GH_TOKEN in the job env."
    required: false
    default: "false"
  baste:
    description: "Run tailor baste to preview what alter would change. Requires GH_TOKEN in the job env."
    required: false
    default: "false"
  measure:
    description: "Run tailor measure to check community health files and configuration alignment."
    required: false
    default: "false"
  docket:
    description: "Run tailor docket to display authentication state and repository context."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [[ -n "${INPUT_VERSION}" ]]; then
          v="${INPUT_VERSION}"
          v="v${v#v}"
        elif [[ "${ACTION_REF}" =~ ^v[0-9]+\.[0-9]+ ]]; then
          v="${ACTION_REF}"
        elif [[ "${ACTION_REF}" =~ ^v([0-9]+)$ ]]; then
          major="${BASH_REMATCH[1]}"
          v=$(gh api "repos/${ACTION_REPO}/releases" --paginate --jq \
            "[.[] | select(.prerelease == false) | .tag_name | select(startswith(\"v${major}.\"))] | first")
          if [[ -z "${v}" || "${v}" == "null" ]]; then
            echo "::error::No stable release found for major version v${major}"
            exit 1
          fi
        else
          v=$(gh api "repos/${ACTION_REPO}/releases/latest" --jq '.tag_name')
        fi
        echo "tag=${v}" >> "$GITHUB_OUTPUT"
        echo "version=${v#v}" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPO: ${{ github.action_repository }}

    - name: Install tailor
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)    os="linux";  arch="amd64" ;;
          Linux-ARM64)  os="linux";  arch="arm64" ;;
          macOS-X64)    os="darwin"; arch="amd64" ;;
          macOS-ARM64)  os="darwin"; arch="arm64" ;;
          *)
            echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac

        url="https://github.com/${ACTION_REPO}/releases/download/${{ steps.version.outputs.tag }}/tailor-${os}-${arch}"
        curl -fsSL "${url}" -o "${RUNNER_TEMP}/tailor"
        chmod +x "${RUNNER_TEMP}/tailor"
        echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
        echo "Installed tailor ${{ steps.version.outputs.version }} for ${os}/${arch}"
      env:
        ACTION_REPO: ${{ github.action_repository }}

    - name: Run tailor fit
      if: inputs.fit == 'true'
      shell: bash
      run: tailor fit .

    - name: Run tailor alter
      if: inputs.alter == 'true'
      shell: bash
      run: tailor alter

    - name: Run tailor baste
      if: inputs.baste == 'true'
      shell: bash
      run: tailor baste

    - name: Run tailor measure
      if: inputs.measure == 'true'
      shell: bash
      run: tailor measure

    - name: Run tailor docket
      if: inputs.docket == 'true'
      shell: bash
      run: tailor docket
